<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Group | المنصة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="/static/style.css?v=2">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Winwheel/2.7.0/Winwheel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        /* عدل هذا السطر هنا أيضاً */
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important; 
            color: #fff; 
            min-height: 100vh;
        }
        
        .glass-box { 
            background: rgba(255, 255, 255, 0.03) !important; 
            backdrop-filter: blur(20px) !important; 
            -webkit-backdrop-filter: blur(20px) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
        }
        
        .glass { 
            background: rgba(15, 23, 42, 0.7) !important; 
            backdrop-filter: blur(15px) !important; 
            -webkit-backdrop-filter: blur(15px) !important; 
            border: 1px solid rgba(56, 189, 248, 0.3) !important; 
        }

        .btn-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="min-h-screen pb-24"> 

    <a href="/spin-wheel" 
       class="fixed bottom-24 right-6 z-50 bg-yellow-500 p-4 rounded-full shadow-[0_0_20px_rgba(234,179,8,0.5)] animate-bounce border-2 border-black">
        <i class="fas fa-gift text-black text-2xl"></i>
    </a>

    <div class="max-w-md mx-auto p-4">
        {% block content %}{% endblock %}
    </div>

    <div class="fixed bottom-0 left-0 w-full glass-box border-t border-white/10 p-3 flex justify-around items-center text-xs z-50">
        <a href="/" class="flex flex-col items-center gap-1 {{ 'text-yellow-500' if request.url.path == '/' }}">
            <i class="fas fa-home text-lg"></i> الرئيسية
        </a>
        <a href="/products" class="flex flex-col items-center gap-1 {{ 'text-yellow-500' if request.url.path == '/products' }}">
            <i class="fas fa-box text-lg"></i> المنتجات
        </a>
        <a href="/team" class="flex flex-col items-center gap-1 {{ 'text-yellow-500' if request.url.path == '/team' }}">
            <i class="fas fa-users text-lg"></i> الفريق
        </a>
        <a href="/profile" class="flex flex-col items-center gap-1 {{ 'text-yellow-500' if request.url.path == '/profile' }}">
            <i class="fas fa-user-gear text-lg"></i> حسابي
        </a>
    </div>

</body>
</html>
