{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-center">إيداع رصيد</h2>

    <div class="glass-box p-6 rounded-3xl">
        <p class="text-gray-400 text-sm mb-4">يرجى تحويل المبلغ إلى المحفظة التالية:</p>
        
        <div class="bg-black/50 p-4 rounded-xl border border-yellow-500 text-center">
            <p class="text-gray-400 text-xs">رقم محفظة فودافون كاش المخصص لك</p>
            <h3 class="text-2xl font-bold text-yellow-500 my-2 tracking-widest">{{ wallet }}</h3>
            <p class="text-[10px] text-gray-500 mt-2">ملاحظة: يتغير هذا الرقم لضمان سرعة معالجة طلبك</p>
        </div>
    </div>

    <form action="/deposit" method="post" class="space-y-4">
        <input type="number" name="amount" placeholder="المبلغ المحول (ج.م)" required 
               class="w-full bg-transparent border border-white/20 p-4 rounded-xl outline-none focus:border-yellow-500">
        
        <input type="text" name="transaction_id" placeholder="كود التحويل (أو آخر 4 أرقام)" required 
               class="w-full bg-transparent border border-white/20 p-4 rounded-xl outline-none focus:border-yellow-500">
        
        <button type="submit" class="w-full bg-yellow-600 py-4 rounded-xl font-bold hover:bg-yellow-500 transition">
            إرسال طلب الإيداع
        </button>
    </form>
</div>
{% endblock %}
