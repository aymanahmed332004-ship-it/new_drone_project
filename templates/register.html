<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* كلاس الزجاج الفخم */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(56, 189, 248, 0.3); }
        body { background: #0f172a; }
        /* تحسين مظهر قائمة الدولة */
        select { background-image: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div class="h-64 w-full overflow-hidden relative">
        <img src="/static/auth_bg/register-bg.jpg" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-[#0f172a]"></div>
    </div>

    <div class="relative flex justify-center -mt-16 z-20">
        <div class="bg-[#0f172a] p-1.5 rounded-full border-4 border-[#0f172a] shadow-xl">
            <img src="/static/logo.png" alt="My Logo" class="w-20 h-20 rounded-full object-contain border-2 border-sky-500">
        </div>
    </div>

    <div class="relative px-4 pb-10 flex justify-center">
        <div class="glass p-8 rounded-3xl shadow-[0_0_30px_rgba(2,132,199,0.3)] w-full max-w-sm z-10 border border-white/10">
            <h2 class="text-3xl font-bold text-center mb-6 text-sky-400">إنشاء حساب</h2>
            
            {% if error %}
            <div class="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-xl mb-4 text-center text-sm">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="/register/" method="post" class="space-y-4">
                
                <div class="flex gap-2">
                    <select name="country_code" class="w-1/3 p-3 rounded-xl bg-black/50 border border-gray-600 text-white focus:outline-none focus:border-sky-500">
                        <option value="+20">🇪🇬 +20</option>
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+965">🇰🇼 +965</option>
                        <option value="+968">🇴🇲 +968</option>
                    </select>
                    <input type="text" name="phone" placeholder="رقم الهاتف" required 
                           class="w-2/3 p-3 rounded-xl bg-black/50 border border-gray-600 text-white placeholder-white/50 focus:outline-none focus:border-sky-500 transition">
                </div>
                
                <input type="password" name="password" placeholder="كلمة السر" required 
                       class="w-full p-3 rounded-xl bg-black/50 border border-gray-600 text-white placeholder-white/50 focus:outline-none focus:border-sky-500 transition">
                
                <input type="password" name="confirm_password" placeholder="تأكيد كلمة السر" required 
                       class="w-full p-3 rounded-xl bg-black/50 border border-gray-600 text-white placeholder-white/50 focus:outline-none focus:border-sky-500 transition">
                
                <div id="password-error" class="text-red-400 text-xs hidden mt-1 text-center font-bold">⚠️ كلمة المرور غير مطابقة</div>
                
                <input type="text" name="invite_code" placeholder="كود الدعوة (اختياري)" 
                       class="w-full p-3 rounded-xl bg-black/50 border border-gray-600 text-white placeholder-white/50 focus:outline-none focus:border-sky-500 transition">
                
                <button type="submit" id="submit-btn"
                        class="w-full bg-gradient-to-r from-sky-600 to-blue-600 py-3 rounded-xl font-bold text-white shadow-lg hover:from-sky-500 hover:to-blue-500 transition transform hover:scale-[1.02]">
                    إنشاء الحساب
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-white/70">
                لديك حساب بالفعل؟ <a href="/login" class="text-sky-400 font-bold hover:underline">سجل دخولك الآن</a>
            </p>
        </div>
    </div>

    <script>
        const pass = document.querySelector('input[name="password"]');
        const confirm = document.querySelector('input[name="confirm_password"]');
        const errorDiv = document.getElementById('password-error');
        const submitBtn = document.getElementById('submit-btn');

        function checkMatch() {
            if (confirm.value !== "" && pass.value !== confirm.value) {
                confirm.classList.add('border-red-500');
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                confirm.classList.remove('border-red-500');
                errorDiv.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
        confirm.onkeyup = checkMatch;
        pass.onkeyup = checkMatch;
    </script>
</body>
</html>
