{% extends "base.html" %}

{% block content %}
<div class="glass p-6 rounded-3xl border border-sky-500/30">
    <h2 class="text-xl font-bold text-sky-400 mb-6 text-center">
        {% if has_password %} تغيير كلمة مرور السحب {% else %} تعيين كلمة مرور السحب {% endif %}
    </h2>
    
    <form action="/security" method="POST" class="space-y-6">
        
        {% if error %}
            <div class="text-red-500 text-center mb-4 font-bold">{{ error }}</div>
        {% endif %}

        {% if has_password %}
        <div>
            <label class="block text-white/60 text-sm mb-2">كلمة مرور السحب الحالية</label>
            <input type="password" name="old_password" required
                   class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-sky-500 outline-none"
                   placeholder="******">
        </div>
        {% endif %}

        <div>
            <label class="block text-white/60 text-sm mb-2">كلمة مرور السحب الجديدة</label>
            <input type="password" name="new_withdraw_password" required
                   class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-sky-500 outline-none"
                   placeholder="******">
        </div>

        <div>
            <label class="block text-white/60 text-sm mb-2">تأكيد كلمة المرور الجديدة</label>
            <input type="password" name="confirm_password" required
                   class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-sky-500 outline-none"
                   placeholder="******">
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-sky-600 to-sky-800 py-4 rounded-2xl font-bold hover:scale-105 transition">
            حفظ كلمة المرور
        </button>
    </form>
</div>
{% endblock %}
