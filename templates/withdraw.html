{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-center">طلب سحب الأرباح</h2>

    <div id="error-box" class="hidden bg-red-600/20 border border-red-500/50 text-red-500 p-4 rounded-xl text-center font-bold mb-6">
        </div>

    <div class="glass-box p-6 rounded-3xl">
        <p class="text-gray-400 text-sm mb-4">رصيدك الحالي: <span class="text-yellow-500 font-bold">{{ user.balance }} ج.م</span></p>
        
        <div class="bg-yellow-500/10 border border-yellow-500/20 p-3 rounded-xl mb-4 text-center">
            <p class="text-yellow-500 text-xs font-bold">
                <i class="fas fa-info-circle mr-1"></i> الحد الأدنى للسحب هو 90 ج.م
            </p>
        </div>

        <form action="/withdraw" method="post" class="space-y-4">
            <input type="number" name="amount" placeholder="المبلغ المراد سحبه" required min="90"
                   oninput="this.setCustomValidity(this.value < 90 ? 'الحد الأدنى للسحب هو 90 جنيه' : '')"
                   class="w-full bg-black/50 border border-white/20 p-4 rounded-xl outline-none focus:border-yellow-500 text-white">
            
            <input type="text" name="wallet" placeholder="رقم محفظة فودافون كاش للسحب" required 
                   class="w-full bg-black/50 border border-white/20 p-4 rounded-xl outline-none focus:border-yellow-500 text-white">
            
            <!-- حقل كلمة مرور السحب -->
            <div class="relative">
                <input type="password" name="withdraw_password" placeholder="كلمة مرور السحب" required
                       class="w-full bg-black/50 border border-white/20 p-4 rounded-xl outline-none focus:border-yellow-500 text-white">
                <button type="button" onclick="togglePassword()" class="absolute left-4 top-4 text-gray-400">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button type="submit" class="w-full bg-yellow-600 py-4 rounded-xl font-bold hover:bg-yellow-500 transition">
                تأكيد طلب السحب
            </button>
        </form>
    </div>
    
    <p class="text-xs text-gray-500 text-center mt-4">
        ملاحظة: سيتم مراجعة طلب السحب من قبل الإدارة في أقرب وقت.
    </p>
</div>

<script>
    // كود إظهار/إخفاء كلمة المرور
    function togglePassword() {
        const input = document.querySelector('input[name="withdraw_password"]');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        const errorBox = document.getElementById('error-box');
        errorBox.textContent = urlParams.get('error');
        errorBox.classList.remove('hidden');
    }
</script>
{% endblock %}
